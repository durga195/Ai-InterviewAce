    <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - InterviewAce</title>

<style>
*{
    margin:10;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f4f4f4;
}

.login-container{
    background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
}

button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#45a049;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#4CAF50;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>InterviewAce Login</h2>

    <form>
        <div class="input-group">
            <input type="email" placeholder="Email" required>
        </div>

        <div class="input-group">
            <input type="password" placeholder="Password" required>
        </div>

        <button type="submit">login</button>

        <p>Don't have an account?
            <a href="login.html">sign in</a>
        </p>
    </form>
</div>

</body>
</html>
    
</body>
</html>
