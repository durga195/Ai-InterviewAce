<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interviewace-login</title>
</head>
<style>
    *{
        margin:10;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}
.container{
background:white;
    padding:30px;
    width:350px;
    border-radius:15px;
        box-shadow:0 5px 15px rgba(0,0,0,0.2);

    }
    .container h1{
        color: blue;
    }
    .input-group{
        justify-content: center;
        align-items: center;

    }
button{
    width:100%;
    padding:12px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
}
.pic{
    display: flex;
    justify-content: space-between;
    align-items: right;
    top-left:50%;
}
</style>
<body>
    <div class="container">
    <h1>Create Account</h1>
    <P>join interviewace and start your journey</P>
    <form>
    <div class="input-group">
        <label>firstname</label>
        <input type="firstname" text="firstname" placeholder="name" required>
        </div>
        <br>
        <div class="input-group">
            <label>lastname</label>
            <input type="text" placeholder="enter last name" required>
        </div>
        <br>
        <div class="input-group">
            <label>Email</label>
            <input type="text" placeholder="enter your email" required>
        </div>
        <br>
        <div class="input-group">
            <label>password</label>
            <input type="text" placeholder="create a password" required>
        </div>
        <br>
        <div class="input-group">
            <label>confirm password</label>
            <input type="text" placeholder="confirm your password" required>
        </div>
        <br>
 <p>i agree to the
            <a href="terms and conditions.html">terms and conditions?</a>
        </p>
        <div class="button">
                <button type="register">Register</button>
        </div>
        <P> Already have an account?
            <a href="login.html">Login</a>
        </P>
    </div>

        </form>
                <div class="pic">
<img src="https://www.shutterstock.com/shutterstock/videos/1093372659/thumb/2.jpg?ip=x480">
        </div>



    </div>

    
</body>
</html>
